name: Desktop

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x
    - name: Build desktop tool
      run: dotnet build -c Release src/OneHub.Tools.HeapView/OneHub.Tools.HeapView.csproj
    - name: Build MCP tool
      run: dotnet build -c Release src/OneHub.Tools.HeapView.Mcp/OneHub.Tools.HeapView.Mcp.csproj
    - name: Pack desktop tool
      run: dotnet pack -c Release src/OneHub.Tools.HeapView/OneHub.Tools.HeapView.csproj
    - name: Pack MCP tool
      run: dotnet pack -c Release src/OneHub.Tools.HeapView.Mcp/OneHub.Tools.HeapView.Mcp.csproj
    - name: Publish the package to nuget.org
      if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/master' }}
      run: dotnet nuget push nupkg/*.nupkg -k $NUGET_API_KEY -s https://api.nuget.org/v3/index.json
      env:
        NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}      
